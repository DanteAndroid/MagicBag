<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MagicBag | 魔法口袋</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #1a1a1a;
      --card: #242424;
      --card-soft: #2c2c2c;
      --text: #f3efe5;
      --muted: #b7b1a0;
      --accent: #c9a84c;
      --accent-soft: rgba(201, 168, 76, 0.18);
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      --radius: 20px;
      --max-width: 720px;
      --composer-height: 132px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(201, 168, 76, 0.12), transparent 36%),
        linear-gradient(180deg, #1f1f1f 0%, var(--bg) 28%);
      color: var(--text);
      font: 16px/1.7 system-ui, sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(120deg, transparent 0%, rgba(255, 255, 255, 0.02) 45%, transparent 100%),
        radial-gradient(circle at 20% 10%, rgba(201, 168, 76, 0.08), transparent 22%);
      opacity: 0.8;
    }

    .app {
      width: min(calc(100% - 32px), var(--max-width));
      margin: 0 auto;
      padding: 36px 0 calc(var(--composer-height) + 36px);
      position: relative;
      z-index: 1;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 28px;
    }

    .hero-copy {
      min-width: 0;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: clamp(28px, 4vw, 36px);
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
      flex-wrap: wrap;
      text-decoration: none;
    }

    .brand-mark {
      color: var(--accent);
      text-shadow: 0 0 20px rgba(201, 168, 76, 0.3);
    }

    .brand-name {
      color: var(--accent);
      font-weight: 700;
    }

    .brand:hover .brand-name {
      text-shadow: 0 0 20px rgba(201, 168, 76, 0.28);
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      max-width: 52ch;
    }

    .lang-switch {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px;
      background: rgba(36, 36, 36, 0.85);
      border-radius: 999px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }

    .lang-btn {
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      padding: 8px 12px;
      font: 600 13px/1 system-ui, sans-serif;
      cursor: pointer;
      transition: background 140ms ease, color 140ms ease;
    }

    .lang-btn.active {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .chat {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .empty-state {
      background: rgba(36, 36, 36, 0.84);
      box-shadow: var(--shadow);
      border-radius: 24px;
      padding: 24px;
      backdrop-filter: blur(10px);
    }

    .empty-state h2 {
      margin: 0 0 8px;
      font-size: 1.05rem;
    }

    .empty-state p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .examples {
      display: grid;
      gap: 10px;
    }

    .example-btn {
      width: 100%;
      text-align: left;
      background: var(--card-soft);
      border: 0;
      border-radius: 16px;
      color: var(--text);
      padding: 14px 16px;
      font: inherit;
      cursor: pointer;
      transition: transform 140ms ease, background 140ms ease, box-shadow 140ms ease;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
    }

    .example-btn:hover {
      transform: translateY(-1px);
      background: #303030;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.18);
    }

    .message {
      display: flex;
      width: 100%;
      animation: fade-up 260ms ease;
    }

    .message.user {
      justify-content: flex-end;
    }

    .message.assistant {
      justify-content: flex-start;
    }

    .assistant-shell {
      width: 100%;
    }

    .bubble,
    .answer-card {
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .bubble {
      width: auto;
      max-width: min(88%, 560px);
      background: linear-gradient(180deg, rgba(201, 168, 76, 0.22), rgba(201, 168, 76, 0.12));
      color: var(--text);
      padding: 16px 18px;
    }

    .answer-card {
      position: relative;
      width: 100%;
      background: rgba(36, 36, 36, 0.92);
      padding: 14px 16px 16px;
      backdrop-filter: blur(10px);
    }

    .answer-meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 4px 0;
      color: var(--muted);
      font-size: 13px;
      flex-wrap: wrap;
    }

    .answer-tools {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .tool-btn {
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      width: 32px;
      height: 32px;
      padding: 0;
      font: 16px/1 system-ui, sans-serif;
      cursor: pointer;
      transition: background 140ms ease, color 140ms ease;
    }

    .tool-btn:hover {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .answer-body {
      color: var(--text);
    }

    .answer-body :first-child {
      margin-top: 0;
    }

    .answer-body :last-child {
      margin-bottom: 0;
    }

    .answer-body h1,
    .answer-body h2,
    .answer-body h3 {
      line-height: 1.3;
      margin: 1.1em 0 0.5em;
      color: #fff7dd;
    }

    .answer-body ul,
    .answer-body ol {
      padding-left: 1.3rem;
    }

    .answer-body code {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 0.12em 0.4em;
      font-size: 0.95em;
    }

    .answer-body pre {
      margin: 1em 0;
      background: rgba(0, 0, 0, 0.28);
      border-radius: 14px;
      padding: 14px;
      overflow-x: auto;
    }

    .answer-body pre code {
      background: transparent;
      padding: 0;
    }

    .answer-body blockquote {
      margin: 1em 0;
      padding-left: 14px;
      border-left: 3px solid rgba(201, 168, 76, 0.45);
      color: var(--muted);
    }

    .answer-body a {
      color: var(--accent);
    }

    .answer-body hr {
      border: 0;
      height: 1px;
      margin: 1.2em 0;
      background: linear-gradient(90deg, transparent, rgba(201, 168, 76, 0.5), transparent);
    }

    .sources {
      margin-top: 18px;
      display: grid;
      gap: 10px;
    }

    .source-item {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 16px;
    }

    .source-chip {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(201, 168, 76, 0.08);
      color: var(--text);
      border: 0;
      border-radius: 16px;
      padding: 12px 14px;
      cursor: pointer;
      font: 13px/1.4 system-ui, sans-serif;
      text-align: left;
    }

    .source-chip:hover {
      background: rgba(201, 168, 76, 0.14);
    }

    .source-head {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .source-title {
      color: var(--text);
      font-weight: 600;
    }

    .source-author {
      color: var(--muted);
      font-size: 12px;
    }

    .source-author::before {
      content: "·";
      margin-right: 8px;
      color: rgba(201, 168, 76, 0.75);
    }

    .source-toggle {
      color: var(--accent);
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
    }

    .source-snippet {
      display: none;
      margin-top: 10px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 16px;
      padding: 12px 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .source-item.open .source-snippet {
      display: block;
    }

    .typing {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
    }

    .typing span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 900ms infinite ease-in-out;
    }

    .typing span:nth-child(2) {
      animation-delay: 120ms;
    }

    .typing span:nth-child(3) {
      animation-delay: 240ms;
    }

    .loading-meta {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .composer {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: min(calc(100% - 24px), calc(var(--max-width) + 8px));
      padding: 0 4px;
      z-index: 2;
    }

    .composer-card {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      background: rgba(36, 36, 36, 0.96);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 14px;
      backdrop-filter: blur(14px);
    }

    .composer textarea {
      flex: 1;
      min-height: 54px;
      max-height: 180px;
      resize: none;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      line-height: 1.7;
      padding: 6px 2px;
    }

    .composer textarea::placeholder {
      color: #8f8a7b;
    }

    .send-btn {
      border: 0;
      outline: 0;
      min-width: 110px;
      height: 48px;
      padding: 0 18px;
      border-radius: 16px;
      background: linear-gradient(180deg, #d7b45a 0%, #b69333 100%);
      color: #181512;
      font: 600 15px/1 system-ui, sans-serif;
      cursor: pointer;
      transition: transform 140ms ease, filter 140ms ease, opacity 140ms ease;
    }

    .send-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    .send-btn:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .error {
      color: #ffb4a8;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: translateY(0);
        opacity: 0.35;
      }
      40% {
        transform: translateY(-6px);
        opacity: 1;
      }
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .app {
        width: min(calc(100% - 20px), var(--max-width));
        padding-top: 28px;
      }

      .hero {
        flex-direction: column;
        align-items: stretch;
      }

      .lang-switch {
        align-self: flex-end;
      }

      .composer-card {
        gap: 10px;
        border-radius: 20px;
        padding: 12px;
      }

      .send-btn {
        min-width: 88px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="hero-copy">
        <a class="brand" href="/"><span class="brand-mark">✦</span> <span class="brand-name" data-i18n="brand">魔法口袋</span></a>
        <p class="subtitle" data-i18n="subtitle">面向纸牌魔术、心灵魔术和表演理论的知识助手。它会检索你的资料库，并给出带来源的回答。</p>
      </div>
      <div class="lang-switch" aria-label="language switch">
        <button class="lang-btn active" type="button" data-lang="zh">中文</button>
        <button class="lang-btn" type="button" data-lang="en">EN</button>
      </div>
    </header>

    <section id="chat" class="chat">
      <div id="emptyState" class="empty-state">
        <h2 data-i18n="emptyTitle">你可以问：</h2>
        <p data-i18n="emptyDesc"></p>
        <div class="examples" id="examples"></div>
      </div>
    </section>
  </main>

  <div class="composer">
    <form id="composer" class="composer-card">
      <textarea id="questionInput" rows="1"></textarea>
      <button id="sendButton" class="send-btn" type="submit" data-i18n="send">发送</button>
    </form>
  </div>

  <script>
    const API_STREAM_ENDPOINT = window.location.protocol === "file:" ? "" : "/api/v1/rag/query/stream";
    const chat = document.getElementById("chat");
    const emptyState = document.getElementById("emptyState");
    const composer = document.getElementById("composer");
    const input = document.getElementById("questionInput");
    const sendButton = document.getElementById("sendButton");
    const examples = document.getElementById("examples");

    const translations = {
      zh: {
        pageTitle: "MagicBag | 魔法口袋",
        brand: "魔法口袋",
        subtitle: "纸牌魔术、心灵魔术和表演理论的知识助手。",
        emptyTitle: "你可以问：",
        emptyDesc: "",
        inputPlaceholder: "问一个关于手法、流程或表演理论的问题……",
        send: "发送",
        copyLabel: "复制",
        copiedLabel: "已复制",
        copyFailedLabel: "复制失败",
        retryLabel: "重试",
        noAnswer: "没有返回回答。",
        noSnippet: "暂无原文片段。",
        sourceLabel: "来源",
        unknownAuthor: "作者未标注",
        error: "无法连接到魔法口袋，请检查部署状态、接口地址或跨域配置。",
        loadingThinking: "思考中…… {seconds}s",
        totalTime: "总耗时 {seconds}s",
        timingBreakdown: "Embedding {embedding}s · 检索 {vector}s · 生成 {generation}s",
        examples: [
          "什么是迫牌？可以简单解释一下吗？",
          "推荐一个适合新手的纸牌魔术效果",
          "新手练习纸牌手法应该先学什么？",
          "什么是心灵魔术？适合从哪里开始？",
          "怎样让观众觉得表演更自然？"
        ]
      },
      en: {
        pageTitle: "MagicBag | MagicBag",
        brand: "MagicBag",
        subtitle: "A knowledge assistant for card magic, mentalism, and performance theory.",
        emptyTitle: "You can ask:",
        emptyDesc: "",
        inputPlaceholder: "Ask about a sleight, routine, or performance principle...",
        send: "Send",
        copyLabel: "Copy",
        copiedLabel: "Copied",
        copyFailedLabel: "Copy failed",
        retryLabel: "Retry",
        noAnswer: "No answer returned.",
        noSnippet: "No snippet available.",
        sourceLabel: "Source",
        unknownAuthor: "Author not listed",
        error: "Unable to reach MagicBag. Check the deployment, API endpoint, or CORS configuration.",
        loadingThinking: "Thinking... {seconds}s",
        totalTime: "Total {seconds}s",
        timingBreakdown: "Embedding {embedding}s · Search {vector}s · Generation {generation}s",
        examples: [
          "What is a card force in simple terms?",
          "Recommend a beginner-friendly card magic effect",
          "What should a beginner practice first in card magic?",
          "What is mentalism, and where should a beginner start?",
          "How can I make my performance feel more natural?"
        ]
      }
    };

    let language = "zh";
    let loadingNode = null;
    let loadingTimer = null;
    let loadingStartedAt = 0;
    const conversationHistory = [];
    const MAX_HISTORY_TURNS = 5;

    function t(key) {
      return translations[language][key];
    }

    function escapeHtml(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderMarkdown(markdown) {
      const normalized = markdown.replace(/\r/g, "");
      const fenced = [];
      const text = normalized.replace(/```([\s\S]*?)```/g, (_, code) => {
        const token = "__FENCE_" + fenced.length + "__";
        fenced.push('<pre><code>' + escapeHtml(code.trim()) + "</code></pre>");
        return token;
      });
      const lines = text.split("\n");
      const blocks = [];
      let paragraph = [];
      let listType = null;
      let listItems = [];

      const flushParagraph = () => {
        if (!paragraph.length) return;
        blocks.push("<p>" + inlineMarkdown(paragraph.join(" ")) + "</p>");
        paragraph = [];
      };

      const flushList = () => {
        if (!listItems.length) return;
        const tag = listType === "ol" ? "ol" : "ul";
        blocks.push("<" + tag + ">" + listItems.map((item) => "<li>" + inlineMarkdown(item) + "</li>").join("") + "</" + tag + ">");
        listItems = [];
        listType = null;
      };

      for (const rawLine of lines) {
        const line = rawLine.trim();
        if (!line) {
          flushParagraph();
          flushList();
          continue;
        }

        const headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
        if (headingMatch) {
          flushParagraph();
          flushList();
          const level = headingMatch[1].length;
          blocks.push("<h" + level + ">" + inlineMarkdown(headingMatch[2]) + "</h" + level + ">");
          continue;
        }

        if (/^([-*_])\1{2,}$/.test(line.replace(/\s+/g, ""))) {
          flushParagraph();
          flushList();
          blocks.push("<hr>");
          continue;
        }

        const quoteMatch = line.match(/^>\s?(.*)$/);
        if (quoteMatch) {
          flushParagraph();
          flushList();
          blocks.push("<blockquote><p>" + inlineMarkdown(quoteMatch[1]) + "</p></blockquote>");
          continue;
        }

        if (/^__FENCE_\d+__$/.test(line)) {
          flushParagraph();
          flushList();
          blocks.push(line);
          continue;
        }

        const orderedMatch = line.match(/^\d+\.\s+(.*)$/);
        if (orderedMatch) {
          flushParagraph();
          if (listType && listType !== "ol") flushList();
          listType = "ol";
          listItems.push(orderedMatch[1]);
          continue;
        }

        const bulletMatch = line.match(/^[-*]\s+(.*)$/);
        if (bulletMatch) {
          flushParagraph();
          if (listType && listType !== "ul") flushList();
          listType = "ul";
          listItems.push(bulletMatch[1]);
          continue;
        }

        flushList();
        paragraph.push(line);
      }

      flushParagraph();
      flushList();
      return blocks.join("").replace(/__FENCE_(\d+)__/g, (_, index) => fenced[Number(index)] || "");
    }

    function inlineMarkdown(text) {
      const safe = escapeHtml(text);
      return safe
        .replace(/\[(.+?)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>')
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        .replace(/__(.+?)__/g, "<strong>$1</strong>")
        .replace(/\*(.+?)\*/g, "<em>$1</em>")
        .replace(/_(.+?)_/g, "<em>$1</em>")
        .replace(/`(.+?)`/g, "<code>$1</code>");
    }

    function autoResize() {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 180) + "px";
    }

    function scrollToBottom() {
      window.scrollTo({
        top: document.documentElement.scrollHeight,
        behavior: "smooth"
      });
    }

    function hideEmptyState() {
      if (emptyState) {
        emptyState.style.display = "none";
      }
    }

    function createMessage(role, html) {
      hideEmptyState();
      const wrapper = document.createElement("article");
      wrapper.className = "message " + role;
      wrapper.innerHTML = html;
      chat.appendChild(wrapper);
      scrollToBottom();
      return wrapper;
    }

    function createUserMessage(question) {
      createMessage("user", '<div class="bubble">' + escapeHtml(question) + "</div>");
    }

    function appendHistory(role, content) {
      const trimmed = String(content || "").trim();
      if (!trimmed) return;
      conversationHistory.push({ role, content: trimmed });
      const maxMessages = MAX_HISTORY_TURNS * 2;
      if (conversationHistory.length > maxMessages) {
        conversationHistory.splice(0, conversationHistory.length - maxMessages);
      }
    }

    function formatText(template, values) {
      return template.replace(/\{(\w+)\}/g, (_, key) => values[key] ?? "");
    }

    function formatSeconds(ms) {
      if (typeof ms !== "number" || Number.isNaN(ms)) return "0.0";
      return (ms / 1000).toFixed(ms >= 10000 ? 0 : 1);
    }

    function formatElapsedSeconds(ms) {
      if (typeof ms !== "number" || Number.isNaN(ms)) return "0";
      return String(Math.floor(ms / 1000));
    }

    function startThinkingTicker(node, startedAt) {
      const tick = () => {
        node.textContent = formatText(t("loadingThinking"), {
          seconds: formatElapsedSeconds(Date.now() - startedAt)
        });
      };
      tick();
      return window.setInterval(tick, 900);
    }

    function createLoadingMessage() {
      loadingNode = createMessage(
        "assistant",
        [
          '<div class="answer-card">',
          '<div class="answer-body">',
          '<div class="typing"><span></span><span></span><span></span></div>',
          '<div class="loading-meta"><div class="loading-thinking"></div></div>',
          "</div>",
          "</div>"
        ].join("")
      );
      loadingStartedAt = Date.now();

      const thinkingNode = loadingNode.querySelector(".loading-thinking");
      loadingTimer = startThinkingTicker(thinkingNode, loadingStartedAt);
    }

    function removeLoadingMessage() {
      if (loadingTimer) {
        clearInterval(loadingTimer);
        loadingTimer = null;
      }
      if (loadingNode) {
        loadingNode.remove();
        loadingNode = null;
      }
    }

    function buildSources(sources) {
      if (!Array.isArray(sources) || !sources.length) return "";

      const extractReference = (source, index) => {
        const filename = source.metadata?.filename || source.source || (t("sourceLabel") + " " + (index + 1));
        const parsedName = filename.split("/").pop() || filename;
        const stem = parsedName.replace(/\.[^.]+$/, "");
        const metadataTitle = source.metadata?.title;
        const metadataAuthor = source.metadata?.author;

        if (metadataTitle || metadataAuthor) {
          return {
            filename: parsedName,
            title: metadataTitle || stem,
            author: metadataAuthor || t("unknownAuthor")
          };
        }

        if (stem.includes(" - ")) {
          const [left, right] = stem.split(" - ", 2).map((part) => part.trim());
          const looksLikeAuthor = (text) => {
            if (!text || /\d/.test(text)) return false;
            const words = text.split(/\s+/).filter(Boolean);
            if (!words.length || words.length > 5) return false;
            if (["the", "a", "an"].includes(words[0].toLowerCase())) return false;
            return words.filter((word) => /^[A-Z]/.test(word)).length >= Math.max(1, words.length - 1);
          };
          if (looksLikeAuthor(left)) {
            return { filename: parsedName, title: right || stem, author: left };
          }
          if (looksLikeAuthor(right)) {
            return { filename: parsedName, title: left || stem, author: right };
          }
        }

        return {
          filename: parsedName,
          title: stem,
          author: t("unknownAuthor")
        };
      };

      const items = sources.map((source, index) => {
        const reference = extractReference(source, index);
        const snippet = source.content || t("noSnippet");
        return [
          '<div class="source-item">',
          '<button class="source-chip" type="button">',
          '<span class="source-head">',
          '<span class="source-title">' + escapeHtml(reference.title) + "</span>",
          '<span class="source-author">' + escapeHtml(reference.author) + "</span>",
          "</span>",
          '<span class="source-toggle">+</span>',
          "</button>",
          '<div class="source-snippet">' + escapeHtml(snippet) + "</div>",
          "</div>"
        ].join("");
      }).join("");
      return '<div class="sources">' + items + "</div>";
    }

    function buildAssistantShell(sources) {
      return [
        '<div class="assistant-shell">',
        '<div class="answer-card">',
        '<div class="answer-body"></div>',
        buildSources(sources),
        "</div>",
        '<div class="answer-meta-row">',
        '<div class="answer-timing"></div>',
        '<div class="answer-tools">',
        '<button class="tool-btn retry-btn" type="button" aria-label="' + escapeHtml(t("retryLabel")) + '" title="' + escapeHtml(t("retryLabel")) + '">↻</button>',
        '<button class="tool-btn copy-btn" type="button" aria-label="' + escapeHtml(t("copyLabel")) + '" title="' + escapeHtml(t("copyLabel")) + '">⧉</button>',
        "</div>",
        "</div>",
        "</div>"
      ].join("");
    }

    function replaceMessageWithThinking(messageNode) {
      messageNode.innerHTML = [
        '<div class="assistant-shell">',
        '<div class="answer-card">',
        '<div class="answer-body">',
        '<div class="typing"><span></span><span></span><span></span></div>',
        '<div class="loading-meta"><div class="loading-thinking"></div></div>',
        "</div>",
        "</div>",
        "</div>"
      ].join("");
      const thinkingNode = messageNode.querySelector(".loading-thinking");
      const timer = startThinkingTicker(thinkingNode, Date.now());
      return () => clearInterval(timer);
    }

    function finishAssistantMessage(card, question, answer, timing, options = {}) {
      const { replaceLastAssistantHistory = false } = options;
      const copyButton = card.querySelector(".copy-btn");
      const retryButton = card.querySelector(".retry-btn");
      const timingNode = card.querySelector(".answer-timing");

      copyButton.disabled = false;
      retryButton.disabled = false;
      const setCopyButtonLabel = (label) => {
        copyButton.setAttribute("title", label);
        copyButton.setAttribute("aria-label", label);
      };
      setCopyButtonLabel(t("copyLabel"));

      const totalTimeText = formatText(t("totalTime"), {
        seconds: formatSeconds(timing?.totalTimeMs ?? 0)
      });
      timingNode.textContent = totalTimeText;
      if (
        typeof timing?.embeddingTimeMs === "number" &&
        typeof timing?.vectorSearchTimeMs === "number" &&
        typeof timing?.generationTimeMs === "number"
      ) {
        timingNode.title = formatText(t("timingBreakdown"), {
          embedding: formatSeconds(timing.embeddingTimeMs),
          vector: formatSeconds(timing.vectorSearchTimeMs),
          generation: formatSeconds(timing.generationTimeMs)
        });
      }

      copyButton.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(answer);
          setCopyButtonLabel(t("copiedLabel"));
          setTimeout(() => {
            setCopyButtonLabel(t("copyLabel"));
          }, 1200);
        } catch {
          setCopyButtonLabel(t("copyFailedLabel"));
          setTimeout(() => {
            setCopyButtonLabel(t("copyLabel"));
          }, 1200);
        }
      });

      retryButton.addEventListener("click", () => {
        ask(question, { retryTarget: card });
      });

      card.querySelectorAll(".source-chip").forEach((chip) => {
        chip.addEventListener("click", () => {
          const item = chip.closest(".source-item");
          item.classList.toggle("open");
          chip.querySelector(".source-toggle").textContent = item.classList.contains("open") ? "−" : "+";
        });
      });

      if (replaceLastAssistantHistory && conversationHistory.length) {
        const last = conversationHistory[conversationHistory.length - 1];
        if (last.role === "assistant") {
          last.content = answer.trim();
          return;
        }
      }
      appendHistory("assistant", answer);
    }

    function createErrorMessage(message) {
      createMessage(
        "assistant",
        '<div class="answer-card"><div class="answer-body error"><p>' + escapeHtml(message) + "</p></div></div>"
      );
    }

    function parseSseEvents(buffer, onEvent) {
      let cursor = 0;
      while (true) {
        const boundary = buffer.indexOf("\n\n", cursor);
        if (boundary === -1) break;
        const block = buffer.slice(cursor, boundary);
        cursor = boundary + 2;
        let eventName = "message";
        const dataLines = [];
        for (const line of block.split("\n")) {
          if (line.startsWith("event:")) {
            eventName = line.slice(6).trim();
          } else if (line.startsWith("data:")) {
            dataLines.push(line.slice(5).trimStart());
          }
        }
        if (!dataLines.length) continue;
        onEvent(eventName, JSON.parse(dataLines.join("\n")));
      }
      return buffer.slice(cursor);
    }

    async function askStreaming(question, options = {}) {
      const { retryTarget = null, requestStartedAt = performance.now() } = options;
      if (!API_STREAM_ENDPOINT) {
        throw new Error("Streaming endpoint is unavailable.");
      }

      let stopInlineThinking = options.stopInlineThinking || null;
      const response = await fetch(API_STREAM_ENDPOINT, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Accept": "text/event-stream"
        },
        body: JSON.stringify({
          question,
          top_k: 3,
          language,
          history: conversationHistory.slice(0, -1)
        })
      });

      if (!response.ok || !response.body) {
        throw new Error("Streaming request failed with status " + response.status);
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let card = retryTarget;
      let body = null;
      let answer = "";
      let metadata = {};
      let hasStartedAnswer = false;

      const ensureStreamingCard = () => {
        if (body) return;
        if (card) {
          if (stopInlineThinking) {
            stopInlineThinking();
            stopInlineThinking = null;
          }
          card.innerHTML = buildAssistantShell([]);
          scrollToBottom();
        } else {
          removeLoadingMessage();
          card = createMessage("assistant", buildAssistantShell([]));
        }
        body = card.querySelector(".answer-body");
        card.querySelector(".copy-btn").disabled = true;
        card.querySelector(".retry-btn").disabled = true;
      };

      const attachSources = () => {
        const answerCard = card?.querySelector(".answer-card");
        if (!answerCard || answerCard.querySelector(".sources")) return;
        const sourcesHtml = buildSources(metadata.sources || []);
        if (sourcesHtml) {
          answerCard.insertAdjacentHTML("beforeend", sourcesHtml);
        }
      };

      const handleEvent = (eventName, event) => {
        if (eventName === "error" || event.type === "error") {
          throw new Error(event.detail || "Streaming request failed.");
        }

        if (event.type === "metadata") {
          metadata = event;
          return;
        }

        if (event.type === "delta") {
          ensureStreamingCard();
          hasStartedAnswer = true;
          answer += event.content || "";
          body.innerHTML = renderMarkdown(answer);
          scrollToBottom();
          return;
        }

        if (event.type === "done") {
          if (!hasStartedAnswer) {
            ensureStreamingCard();
          }
          answer = event.answer || answer;
          body.innerHTML = renderMarkdown(answer || t("noAnswer"));
          attachSources();
          finishAssistantMessage(card, question, answer || t("noAnswer"), {
            totalTimeMs: typeof event.total_time_ms === "number"
              ? event.total_time_ms
              : Math.round(performance.now() - requestStartedAt),
            embeddingTimeMs: metadata.embedding_time_ms,
            vectorSearchTimeMs: metadata.vector_search_time_ms,
            retrievalTimeMs: metadata.retrieval_time_ms,
            generationTimeMs: event.generation_time_ms
          }, {
            replaceLastAssistantHistory: Boolean(retryTarget)
          });
        }
      };

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true }).replace(/\r/g, "");
        buffer = parseSseEvents(buffer, handleEvent);
      }
      buffer += decoder.decode().replace(/\r/g, "");
      parseSseEvents(buffer, handleEvent);
    }

    async function ask(question, options = {}) {
      const { retryTarget = null } = options;
      const trimmed = question.trim();
      if (!trimmed) return;

      if (!retryTarget) {
        createUserMessage(trimmed);
        appendHistory("user", trimmed);
      }
      input.value = "";
      autoResize();
      input.focus();
      sendButton.disabled = true;
      let stopInlineThinking = null;
      if (retryTarget) {
        stopInlineThinking = replaceMessageWithThinking(retryTarget);
      } else {
        createLoadingMessage();
      }
      const requestStartedAt = performance.now();

      try {
        await askStreaming(trimmed, {
          retryTarget,
          requestStartedAt,
          stopInlineThinking
        });
      } catch (error) {
        if (stopInlineThinking) {
          stopInlineThinking();
          retryTarget.innerHTML = '<div class="answer-card"><div class="answer-body error"><p>' + escapeHtml(t("error")) + "</p></div></div>";
        } else {
          removeLoadingMessage();
          createErrorMessage(t("error"));
        }
        console.error(error);
      } finally {
        sendButton.disabled = false;
        input.focus();
        scrollToBottom();
      }
    }

    function renderExamples() {
      examples.innerHTML = "";
      for (const question of t("examples")) {
        const button = document.createElement("button");
        button.className = "example-btn";
        button.type = "button";
        button.textContent = question;
        button.addEventListener("click", () => ask(question));
        examples.appendChild(button);
      }
    }

    function applyLanguage(nextLanguage) {
      language = nextLanguage;
      document.documentElement.lang = language === "zh" ? "zh-CN" : "en";
      document.title = t("pageTitle");
      input.placeholder = t("inputPlaceholder");
      sendButton.textContent = t("send");
      document.querySelectorAll("[data-i18n]").forEach((node) => {
        node.textContent = t(node.dataset.i18n);
      });
      document.querySelectorAll(".lang-btn").forEach((button) => {
        button.classList.toggle("active", button.dataset.lang === language);
      });
      renderExamples();
    }

    composer.addEventListener("submit", (event) => {
      event.preventDefault();
      ask(input.value);
    });

    input.addEventListener("input", autoResize);
    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        composer.requestSubmit();
      }
    });

    document.querySelectorAll(".lang-btn").forEach((button) => {
      button.addEventListener("click", () => applyLanguage(button.dataset.lang));
    });

    applyLanguage("zh");
    autoResize();
    input.focus();
  </script>
</body>
</html>
