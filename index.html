<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Magic Oracle</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #1a1a1a;
      --card: #242424;
      --card-soft: #2c2c2c;
      --text: #f3efe5;
      --muted: #b7b1a0;
      --accent: #c9a84c;
      --accent-soft: rgba(201, 168, 76, 0.18);
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      --radius: 20px;
      --radius-sm: 14px;
      --max-width: 720px;
      --composer-height: 132px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(201, 168, 76, 0.12), transparent 36%),
        linear-gradient(180deg, #1f1f1f 0%, var(--bg) 28%);
      color: var(--text);
      font: 16px/1.7 system-ui, sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(120deg, transparent 0%, rgba(255, 255, 255, 0.02) 45%, transparent 100%),
        radial-gradient(circle at 20% 10%, rgba(201, 168, 76, 0.08), transparent 22%);
      opacity: 0.8;
    }

    .app {
      width: min(calc(100% - 32px), var(--max-width));
      margin: 0 auto;
      padding: 36px 0 calc(var(--composer-height) + 36px);
      position: relative;
      z-index: 1;
    }

    .hero {
      margin-bottom: 28px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: clamp(28px, 4vw, 36px);
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .brand-mark {
      color: var(--accent);
      text-shadow: 0 0 20px rgba(201, 168, 76, 0.3);
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      max-width: 52ch;
    }

    .chat {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .empty-state {
      background: rgba(36, 36, 36, 0.84);
      box-shadow: var(--shadow);
      border-radius: 24px;
      padding: 24px;
      backdrop-filter: blur(10px);
    }

    .empty-state h2 {
      margin: 0 0 8px;
      font-size: 1.05rem;
    }

    .empty-state p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .examples {
      display: grid;
      gap: 10px;
    }

    .example-btn {
      width: 100%;
      text-align: left;
      background: var(--card-soft);
      border: 0;
      border-radius: 16px;
      color: var(--text);
      padding: 14px 16px;
      font: inherit;
      cursor: pointer;
      transition: transform 140ms ease, background 140ms ease, box-shadow 140ms ease;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
    }

    .example-btn:hover {
      transform: translateY(-1px);
      background: #303030;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.18);
    }

    .message {
      display: flex;
      width: 100%;
      animation: fade-up 260ms ease;
    }

    .message.user {
      justify-content: flex-end;
    }

    .message.assistant {
      justify-content: flex-start;
    }

    .bubble,
    .answer-card {
      width: min(100%, 620px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .bubble {
      background: linear-gradient(180deg, rgba(201, 168, 76, 0.22), rgba(201, 168, 76, 0.12));
      color: var(--text);
      padding: 16px 18px;
    }

    .answer-card {
      position: relative;
      background: rgba(36, 36, 36, 0.92);
      padding: 18px 18px 16px;
      backdrop-filter: blur(10px);
    }

    .copy-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      padding: 7px 12px;
      font: 12px/1 system-ui, sans-serif;
      cursor: pointer;
      transition: background 140ms ease, color 140ms ease;
    }

    .copy-btn:hover {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .answer-body {
      padding-right: 72px;
      color: var(--text);
    }

    .answer-body :first-child {
      margin-top: 0;
    }

    .answer-body :last-child {
      margin-bottom: 0;
    }

    .answer-body h1,
    .answer-body h2,
    .answer-body h3 {
      line-height: 1.3;
      margin: 1.1em 0 0.5em;
      color: #fff7dd;
    }

    .answer-body ul,
    .answer-body ol {
      padding-left: 1.3rem;
    }

    .answer-body code {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 0.12em 0.4em;
      font-size: 0.95em;
    }

    .sources {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .source-item {
      width: 100%;
    }

    .source-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(201, 168, 76, 0.08);
      color: var(--accent);
      border: 0;
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      font: 13px/1 system-ui, sans-serif;
    }

    .source-chip:hover {
      background: rgba(201, 168, 76, 0.14);
    }

    .source-snippet {
      display: none;
      margin-top: 10px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 16px;
      padding: 12px 14px;
      color: var(--muted);
      white-space: pre-wrap;
    }

    .source-item.open .source-snippet {
      display: block;
    }

    .typing {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
    }

    .typing span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 900ms infinite ease-in-out;
    }

    .typing span:nth-child(2) {
      animation-delay: 120ms;
    }

    .typing span:nth-child(3) {
      animation-delay: 240ms;
    }

    .composer {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: min(calc(100% - 24px), calc(var(--max-width) + 8px));
      padding: 0 4px;
      z-index: 2;
    }

    .composer-card {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      background: rgba(36, 36, 36, 0.96);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 14px;
      backdrop-filter: blur(14px);
    }

    .composer textarea {
      flex: 1;
      min-height: 54px;
      max-height: 180px;
      resize: none;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      line-height: 1.7;
      padding: 6px 2px;
    }

    .composer textarea::placeholder {
      color: #8f8a7b;
    }

    .send-btn {
      border: 0;
      outline: 0;
      min-width: 110px;
      height: 48px;
      padding: 0 18px;
      border-radius: 16px;
      background: linear-gradient(180deg, #d7b45a 0%, #b69333 100%);
      color: #181512;
      font: 600 15px/1 system-ui, sans-serif;
      cursor: pointer;
      transition: transform 140ms ease, filter 140ms ease, opacity 140ms ease;
    }

    .send-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    .send-btn:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .error {
      color: #ffb4a8;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: translateY(0);
        opacity: 0.35;
      }
      40% {
        transform: translateY(-6px);
        opacity: 1;
      }
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .app {
        width: min(calc(100% - 20px), var(--max-width));
        padding-top: 28px;
      }

      .composer-card {
        gap: 10px;
        border-radius: 20px;
        padding: 12px;
      }

      .send-btn {
        min-width: 88px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="brand"><span class="brand-mark">✦</span> Magic Oracle</div>
      <p class="subtitle">Ask about card magic, mentalism, and performance theory. The oracle searches your library and answers with cited source notes.</p>
    </header>

    <section id="chat" class="chat">
      <div id="emptyState" class="empty-state">
        <h2>Start with one of these questions</h2>
        <p>The page talks to your MagicRAG backend and turns the answer into a readable note with expandable source snippets.</p>
        <div class="examples">
          <button class="example-btn" data-question="How do I perform a convincing card force?">How do I perform a convincing card force?</button>
          <button class="example-btn" data-question="What is the Equivoque technique?">What is the Equivoque technique?</button>
          <button class="example-btn" data-question="Recommend a beginner mentalism routine">Recommend a beginner mentalism routine</button>
        </div>
      </div>
    </section>
  </main>

  <div class="composer">
    <form id="composer" class="composer-card">
      <textarea id="questionInput" rows="1" placeholder="Ask the oracle about a sleight, routine, or performance principle..."></textarea>
      <button id="sendButton" class="send-btn" type="submit">Send</button>
    </form>
  </div>

  <script>
    const API_ENDPOINT = "https://magicbag-production.up.railway.app/api/v1/rag/query";
    const chat = document.getElementById("chat");
    const emptyState = document.getElementById("emptyState");
    const composer = document.getElementById("composer");
    const input = document.getElementById("questionInput");
    const sendButton = document.getElementById("sendButton");

    let loadingNode = null;

    function escapeHtml(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderMarkdown(markdown) {
      const lines = markdown.replace(/\r/g, "").split("\n");
      const blocks = [];
      let paragraph = [];
      let listType = null;
      let listItems = [];

      const flushParagraph = () => {
        if (!paragraph.length) return;
        blocks.push("<p>" + inlineMarkdown(paragraph.join(" ")) + "</p>");
        paragraph = [];
      };

      const flushList = () => {
        if (!listItems.length) return;
        const tag = listType === "ol" ? "ol" : "ul";
        blocks.push("<" + tag + ">" + listItems.map((item) => "<li>" + inlineMarkdown(item) + "</li>").join("") + "</" + tag + ">");
        listItems = [];
        listType = null;
      };

      for (const rawLine of lines) {
        const line = rawLine.trim();
        if (!line) {
          flushParagraph();
          flushList();
          continue;
        }

        const headingMatch = line.match(/^(#{1,3})\s+(.*)$/);
        if (headingMatch) {
          flushParagraph();
          flushList();
          const level = headingMatch[1].length;
          blocks.push("<h" + level + ">" + inlineMarkdown(headingMatch[2]) + "</h" + level + ">");
          continue;
        }

        const orderedMatch = line.match(/^\d+\.\s+(.*)$/);
        if (orderedMatch) {
          flushParagraph();
          if (listType && listType !== "ol") flushList();
          listType = "ol";
          listItems.push(orderedMatch[1]);
          continue;
        }

        const bulletMatch = line.match(/^[-*]\s+(.*)$/);
        if (bulletMatch) {
          flushParagraph();
          if (listType && listType !== "ul") flushList();
          listType = "ul";
          listItems.push(bulletMatch[1]);
          continue;
        }

        flushList();
        paragraph.push(line);
      }

      flushParagraph();
      flushList();
      return blocks.join("");
    }

    function inlineMarkdown(text) {
      const safe = escapeHtml(text);
      return safe
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        .replace(/__(.+?)__/g, "<strong>$1</strong>")
        .replace(/`(.+?)`/g, "<code>$1</code>");
    }

    function autoResize() {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 180) + "px";
    }

    function scrollToBottom() {
      window.scrollTo({
        top: document.documentElement.scrollHeight,
        behavior: "smooth",
      });
    }

    function hideEmptyState() {
      if (emptyState) {
        emptyState.style.display = "none";
      }
    }

    function createMessage(role, html) {
      hideEmptyState();
      const wrapper = document.createElement("article");
      wrapper.className = "message " + role;
      wrapper.innerHTML = html;
      chat.appendChild(wrapper);
      scrollToBottom();
      return wrapper;
    }

    function createUserMessage(question) {
      createMessage("user", '<div class="bubble">' + escapeHtml(question) + "</div>");
    }

    function createLoadingMessage() {
      loadingNode = createMessage(
        "assistant",
        '<div class="answer-card"><div class="answer-body"><div class="typing"><span></span><span></span><span></span></div></div></div>'
      );
    }

    function removeLoadingMessage() {
      if (loadingNode) {
        loadingNode.remove();
        loadingNode = null;
      }
    }

    function buildSources(sources) {
      if (!Array.isArray(sources) || !sources.length) return "";
      const items = sources.map((source, index) => {
        const filename = source.metadata?.filename || source.source || ("Source " + (index + 1));
        const snippet = source.content || "No snippet available.";
        return [
          '<div class="source-item">',
          '<button class="source-chip" type="button">',
          "<span>" + escapeHtml(filename) + "</span>",
          "<span>+</span>",
          "</button>",
          '<div class="source-snippet">' + escapeHtml(snippet) + "</div>",
          "</div>"
        ].join("");
      }).join("");
      return '<div class="sources">' + items + "</div>";
    }

    function createAssistantMessage(answer, sources) {
      const card = createMessage(
        "assistant",
        [
          '<div class="answer-card">',
          '<button class="copy-btn" type="button">Copy</button>',
          '<div class="answer-body">' + renderMarkdown(answer) + "</div>",
          buildSources(sources),
          "</div>"
        ].join("")
      );

      const copyButton = card.querySelector(".copy-btn");
      copyButton.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(answer);
          copyButton.textContent = "Copied";
          setTimeout(() => {
            copyButton.textContent = "Copy";
          }, 1200);
        } catch {
          copyButton.textContent = "Failed";
          setTimeout(() => {
            copyButton.textContent = "Copy";
          }, 1200);
        }
      });

      card.querySelectorAll(".source-chip").forEach((chip) => {
        chip.addEventListener("click", () => {
          const item = chip.closest(".source-item");
          item.classList.toggle("open");
          chip.lastElementChild.textContent = item.classList.contains("open") ? "−" : "+";
        });
      });
    }

    function createErrorMessage(message) {
      createMessage(
        "assistant",
        '<div class="answer-card"><div class="answer-body error"><p>' + escapeHtml(message) + "</p></div></div>"
      );
    }

    async function ask(question) {
      const trimmed = question.trim();
      if (!trimmed) return;

      createUserMessage(trimmed);
      input.value = "";
      autoResize();
      input.focus();
      sendButton.disabled = true;
      createLoadingMessage();

      try {
        const response = await fetch(API_ENDPOINT, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            question: trimmed,
            top_k: 3,
          }),
        });

        if (!response.ok) {
          throw new Error("Request failed with status " + response.status);
        }

        const data = await response.json();
        removeLoadingMessage();

        const answer = data.answer || (Array.isArray(data.results) && data.results.length
          ? data.results.map((item) => "- " + (item.content || "")).join("\n")
          : "No answer returned.");
        const sources = data.sources || data.results || [];
        createAssistantMessage(answer, sources);
      } catch (error) {
        removeLoadingMessage();
        createErrorMessage("Unable to reach the oracle. Check the API endpoint or CORS configuration.");
        console.error(error);
      } finally {
        sendButton.disabled = false;
        input.focus();
        scrollToBottom();
      }
    }

    composer.addEventListener("submit", (event) => {
      event.preventDefault();
      ask(input.value);
    });

    input.addEventListener("input", autoResize);
    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        composer.requestSubmit();
      }
    });

    document.querySelectorAll(".example-btn").forEach((button) => {
      button.addEventListener("click", () => {
        input.value = button.dataset.question || "";
        autoResize();
        input.focus();
      });
    });

    autoResize();
    input.focus();
  </script>
</body>
</html>
