<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MagicBag | 魔法口袋</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #1a1a1a;
      --card: #242424;
      --card-soft: #2c2c2c;
      --text: #f3efe5;
      --muted: #b7b1a0;
      --accent: #c9a84c;
      --accent-soft: rgba(201, 168, 76, 0.18);
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      --radius: 20px;
      --max-width: 720px;
      --composer-height: 132px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(201, 168, 76, 0.12), transparent 36%),
        linear-gradient(180deg, #1f1f1f 0%, var(--bg) 28%);
      color: var(--text);
      font: 16px/1.7 system-ui, sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(120deg, transparent 0%, rgba(255, 255, 255, 0.02) 45%, transparent 100%),
        radial-gradient(circle at 20% 10%, rgba(201, 168, 76, 0.08), transparent 22%);
      opacity: 0.8;
    }

    .app {
      width: min(calc(100% - 32px), var(--max-width));
      margin: 0 auto;
      padding: 36px 0 calc(var(--composer-height) + 36px);
      position: relative;
      z-index: 1;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 28px;
    }

    .hero-copy {
      min-width: 0;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: clamp(28px, 4vw, 36px);
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
      flex-wrap: wrap;
    }

    .brand-mark {
      color: var(--accent);
      text-shadow: 0 0 20px rgba(201, 168, 76, 0.3);
    }

    .brand-cn {
      color: var(--accent);
      font-weight: 600;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      max-width: 52ch;
    }

    .lang-switch {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px;
      background: rgba(36, 36, 36, 0.85);
      border-radius: 999px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }

    .lang-btn {
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      padding: 8px 12px;
      font: 600 13px/1 system-ui, sans-serif;
      cursor: pointer;
      transition: background 140ms ease, color 140ms ease;
    }

    .lang-btn.active {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .chat {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .empty-state {
      background: rgba(36, 36, 36, 0.84);
      box-shadow: var(--shadow);
      border-radius: 24px;
      padding: 24px;
      backdrop-filter: blur(10px);
    }

    .empty-state h2 {
      margin: 0 0 8px;
      font-size: 1.05rem;
    }

    .empty-state p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .examples {
      display: grid;
      gap: 10px;
    }

    .example-btn {
      width: 100%;
      text-align: left;
      background: var(--card-soft);
      border: 0;
      border-radius: 16px;
      color: var(--text);
      padding: 14px 16px;
      font: inherit;
      cursor: pointer;
      transition: transform 140ms ease, background 140ms ease, box-shadow 140ms ease;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
    }

    .example-btn:hover {
      transform: translateY(-1px);
      background: #303030;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.18);
    }

    .message {
      display: flex;
      width: 100%;
      animation: fade-up 260ms ease;
    }

    .message.user {
      justify-content: flex-end;
    }

    .message.assistant {
      justify-content: flex-start;
    }

    .bubble,
    .answer-card {
      width: min(100%, 620px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .bubble {
      background: linear-gradient(180deg, rgba(201, 168, 76, 0.22), rgba(201, 168, 76, 0.12));
      color: var(--text);
      padding: 16px 18px;
    }

    .answer-card {
      position: relative;
      background: rgba(36, 36, 36, 0.92);
      padding: 18px 18px 16px;
      backdrop-filter: blur(10px);
    }

    .copy-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      padding: 7px 12px;
      font: 12px/1 system-ui, sans-serif;
      cursor: pointer;
      transition: background 140ms ease, color 140ms ease;
    }

    .copy-btn:hover {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .answer-body {
      padding-right: 72px;
      color: var(--text);
    }

    .answer-body :first-child {
      margin-top: 0;
    }

    .answer-body :last-child {
      margin-bottom: 0;
    }

    .answer-body h1,
    .answer-body h2,
    .answer-body h3 {
      line-height: 1.3;
      margin: 1.1em 0 0.5em;
      color: #fff7dd;
    }

    .answer-body ul,
    .answer-body ol {
      padding-left: 1.3rem;
    }

    .answer-body code {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 0.12em 0.4em;
      font-size: 0.95em;
    }

    .answer-body pre {
      margin: 1em 0;
      background: rgba(0, 0, 0, 0.28);
      border-radius: 14px;
      padding: 14px;
      overflow-x: auto;
    }

    .answer-body pre code {
      background: transparent;
      padding: 0;
    }

    .answer-body blockquote {
      margin: 1em 0;
      padding-left: 14px;
      border-left: 3px solid rgba(201, 168, 76, 0.45);
      color: var(--muted);
    }

    .answer-body a {
      color: var(--accent);
    }

    .answer-body hr {
      border: 0;
      height: 1px;
      margin: 1.2em 0;
      background: linear-gradient(90deg, transparent, rgba(201, 168, 76, 0.5), transparent);
    }

    .sources {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .source-item {
      width: 100%;
    }

    .source-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(201, 168, 76, 0.08);
      color: var(--accent);
      border: 0;
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      font: 13px/1 system-ui, sans-serif;
    }

    .source-chip:hover {
      background: rgba(201, 168, 76, 0.14);
    }

    .source-snippet {
      display: none;
      margin-top: 10px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 16px;
      padding: 12px 14px;
      color: var(--muted);
      white-space: pre-wrap;
    }

    .source-item.open .source-snippet {
      display: block;
    }

    .typing {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
    }

    .typing span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 900ms infinite ease-in-out;
    }

    .typing span:nth-child(2) {
      animation-delay: 120ms;
    }

    .typing span:nth-child(3) {
      animation-delay: 240ms;
    }

    .composer {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: min(calc(100% - 24px), calc(var(--max-width) + 8px));
      padding: 0 4px;
      z-index: 2;
    }

    .composer-card {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      background: rgba(36, 36, 36, 0.96);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 14px;
      backdrop-filter: blur(14px);
    }

    .composer textarea {
      flex: 1;
      min-height: 54px;
      max-height: 180px;
      resize: none;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      line-height: 1.7;
      padding: 6px 2px;
    }

    .composer textarea::placeholder {
      color: #8f8a7b;
    }

    .send-btn {
      border: 0;
      outline: 0;
      min-width: 110px;
      height: 48px;
      padding: 0 18px;
      border-radius: 16px;
      background: linear-gradient(180deg, #d7b45a 0%, #b69333 100%);
      color: #181512;
      font: 600 15px/1 system-ui, sans-serif;
      cursor: pointer;
      transition: transform 140ms ease, filter 140ms ease, opacity 140ms ease;
    }

    .send-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    .send-btn:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .error {
      color: #ffb4a8;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: translateY(0);
        opacity: 0.35;
      }
      40% {
        transform: translateY(-6px);
        opacity: 1;
      }
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .app {
        width: min(calc(100% - 20px), var(--max-width));
        padding-top: 28px;
      }

      .hero {
        flex-direction: column;
        align-items: stretch;
      }

      .lang-switch {
        align-self: flex-end;
      }

      .composer-card {
        gap: 10px;
        border-radius: 20px;
        padding: 12px;
      }

      .send-btn {
        min-width: 88px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="hero-copy">
        <div class="brand"><span class="brand-mark">✦</span> <span data-i18n="brandEn">MagicBag</span> <span class="brand-cn" data-i18n="brandCn">魔法口袋</span></div>
        <p class="subtitle" data-i18n="subtitle">面向纸牌魔术、心灵魔术和表演理论的知识助手。它会检索你的资料库，并给出带来源的回答。</p>
      </div>
      <div class="lang-switch" aria-label="language switch">
        <button class="lang-btn active" type="button" data-lang="zh">中文</button>
        <button class="lang-btn" type="button" data-lang="en">EN</button>
      </div>
    </header>

    <section id="chat" class="chat">
      <div id="emptyState" class="empty-state">
        <h2 data-i18n="emptyTitle">从这些问题开始</h2>
        <p data-i18n="emptyDesc">页面会连接你的 MagicRAG 后端，把回答和来源片段整理成可展开阅读的笔记。</p>
        <div class="examples" id="examples"></div>
      </div>
    </section>
  </main>

  <div class="composer">
    <form id="composer" class="composer-card">
      <textarea id="questionInput" rows="1"></textarea>
      <button id="sendButton" class="send-btn" type="submit" data-i18n="send">发送</button>
    </form>
  </div>

  <script>
    const FALLBACK_API_ENDPOINT = "https://magicbag-production.up.railway.app/api/v1/rag/query";
    const API_ENDPOINT = window.location.protocol === "file:" ? FALLBACK_API_ENDPOINT : "/api/v1/rag/query";
    const chat = document.getElementById("chat");
    const emptyState = document.getElementById("emptyState");
    const composer = document.getElementById("composer");
    const input = document.getElementById("questionInput");
    const sendButton = document.getElementById("sendButton");
    const examples = document.getElementById("examples");

    const translations = {
      zh: {
        pageTitle: "MagicBag | 魔法口袋",
        brandEn: "MagicBag",
        brandCn: "魔法口袋",
        subtitle: "纸牌魔术、心灵魔术和表演理论的知识助手。",
        emptyTitle: "从这些问题开始",
        emptyDesc: "点击推荐问题可直接提问，回答会以流式方式呈现，并附上可展开的来源片段。",
        inputPlaceholder: "问一个关于手法、流程或表演理论的问题……",
        send: "发送",
        copy: "复制",
        copied: "已复制",
        copyFailed: "失败",
        noAnswer: "没有返回回答。",
        noSnippet: "暂无原文片段。",
        sourceLabel: "来源",
        error: "无法连接到魔法口袋，请检查部署状态、接口地址或跨域配置。",
        examples: [
          "如何做一个令人信服的迫牌？",
          "什么是双关语？",
          "推荐一个适合新手的心灵魔术流程",
          "如何让双翻转看起来更自然？",
          "观众管理在纸牌魔术里为什么重要？"
        ]
      },
      en: {
        pageTitle: "MagicBag | MagicBag",
        brandEn: "MagicBag",
        brandCn: "MagicBag",
        subtitle: "A knowledge assistant for card magic, mentalism, and performance theory.",
        emptyTitle: "Start with one of these questions",
        emptyDesc: "Click a suggested question to send it immediately. Answers render as markdown with a streaming reveal and expandable source snippets.",
        inputPlaceholder: "Ask about a sleight, routine, or performance principle...",
        send: "Send",
        copy: "Copy",
        copied: "Copied",
        copyFailed: "Failed",
        noAnswer: "No answer returned.",
        noSnippet: "No snippet available.",
        sourceLabel: "Source",
        error: "Unable to reach MagicBag. Check the deployment, API endpoint, or CORS configuration.",
        examples: [
          "How do I perform a convincing card force?",
          "What is the Equivoque technique?",
          "Recommend a beginner mentalism routine",
          "How can I make a double lift look natural?",
          "Why is audience management important in card magic?"
        ]
      }
    };

    let language = "zh";
    let loadingNode = null;

    function t(key) {
      return translations[language][key];
    }

    function escapeHtml(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderMarkdown(markdown) {
      const normalized = markdown.replace(/\r/g, "");
      const fenced = [];
      const text = normalized.replace(/```([\s\S]*?)```/g, (_, code) => {
        const token = "__FENCE_" + fenced.length + "__";
        fenced.push('<pre><code>' + escapeHtml(code.trim()) + "</code></pre>");
        return token;
      });
      const lines = text.split("\n");
      const blocks = [];
      let paragraph = [];
      let listType = null;
      let listItems = [];

      const flushParagraph = () => {
        if (!paragraph.length) return;
        blocks.push("<p>" + inlineMarkdown(paragraph.join(" ")) + "</p>");
        paragraph = [];
      };

      const flushList = () => {
        if (!listItems.length) return;
        const tag = listType === "ol" ? "ol" : "ul";
        blocks.push("<" + tag + ">" + listItems.map((item) => "<li>" + inlineMarkdown(item) + "</li>").join("") + "</" + tag + ">");
        listItems = [];
        listType = null;
      };

      for (const rawLine of lines) {
        const line = rawLine.trim();
        if (!line) {
          flushParagraph();
          flushList();
          continue;
        }

        const headingMatch = line.match(/^(#{1,3})\s+(.*)$/);
        if (headingMatch) {
          flushParagraph();
          flushList();
          const level = headingMatch[1].length;
          blocks.push("<h" + level + ">" + inlineMarkdown(headingMatch[2]) + "</h" + level + ">");
          continue;
        }

        if (/^([-*_])\1{2,}$/.test(line.replace(/\s+/g, ""))) {
          flushParagraph();
          flushList();
          blocks.push("<hr>");
          continue;
        }

        const quoteMatch = line.match(/^>\s?(.*)$/);
        if (quoteMatch) {
          flushParagraph();
          flushList();
          blocks.push("<blockquote><p>" + inlineMarkdown(quoteMatch[1]) + "</p></blockquote>");
          continue;
        }

        if (/^__FENCE_\d+__$/.test(line)) {
          flushParagraph();
          flushList();
          blocks.push(line);
          continue;
        }

        const orderedMatch = line.match(/^\d+\.\s+(.*)$/);
        if (orderedMatch) {
          flushParagraph();
          if (listType && listType !== "ol") flushList();
          listType = "ol";
          listItems.push(orderedMatch[1]);
          continue;
        }

        const bulletMatch = line.match(/^[-*]\s+(.*)$/);
        if (bulletMatch) {
          flushParagraph();
          if (listType && listType !== "ul") flushList();
          listType = "ul";
          listItems.push(bulletMatch[1]);
          continue;
        }

        flushList();
        paragraph.push(line);
      }

      flushParagraph();
      flushList();
      return blocks.join("").replace(/__FENCE_(\d+)__/g, (_, index) => fenced[Number(index)] || "");
    }

    function inlineMarkdown(text) {
      const safe = escapeHtml(text);
      return safe
        .replace(/\[(.+?)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>')
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        .replace(/__(.+?)__/g, "<strong>$1</strong>")
        .replace(/\*(.+?)\*/g, "<em>$1</em>")
        .replace(/_(.+?)_/g, "<em>$1</em>")
        .replace(/`(.+?)`/g, "<code>$1</code>");
    }

    function autoResize() {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 180) + "px";
    }

    function scrollToBottom() {
      window.scrollTo({
        top: document.documentElement.scrollHeight,
        behavior: "smooth"
      });
    }

    function hideEmptyState() {
      if (emptyState) {
        emptyState.style.display = "none";
      }
    }

    function createMessage(role, html) {
      hideEmptyState();
      const wrapper = document.createElement("article");
      wrapper.className = "message " + role;
      wrapper.innerHTML = html;
      chat.appendChild(wrapper);
      scrollToBottom();
      return wrapper;
    }

    function createUserMessage(question) {
      createMessage("user", '<div class="bubble">' + escapeHtml(question) + "</div>");
    }

    function createLoadingMessage() {
      loadingNode = createMessage(
        "assistant",
        '<div class="answer-card"><div class="answer-body"><div class="typing"><span></span><span></span><span></span></div></div></div>'
      );
    }

    function removeLoadingMessage() {
      if (loadingNode) {
        loadingNode.remove();
        loadingNode = null;
      }
    }

    function buildSources(sources) {
      if (!Array.isArray(sources) || !sources.length) return "";
      const items = sources.map((source, index) => {
        const filename = source.metadata?.filename || source.source || (t("sourceLabel") + " " + (index + 1));
        const snippet = source.content || t("noSnippet");
        return [
          '<div class="source-item">',
          '<button class="source-chip" type="button">',
          "<span>" + escapeHtml(filename) + "</span>",
          "<span>+</span>",
          "</button>",
          '<div class="source-snippet">' + escapeHtml(snippet) + "</div>",
          "</div>"
        ].join("");
      }).join("");
      return '<div class="sources">' + items + "</div>";
    }

    async function streamAssistantMessage(answer, sources) {
      const card = createMessage(
        "assistant",
        [
          '<div class="answer-card">',
          '<button class="copy-btn" type="button">' + escapeHtml(t("copy")) + "</button>",
          '<div class="answer-body"></div>',
          buildSources(sources),
          "</div>"
        ].join("")
      );

      const body = card.querySelector(".answer-body");
      const copyButton = card.querySelector(".copy-btn");
      copyButton.disabled = true;

      const total = answer.length;
      const step = total > 1800 ? 10 : total > 900 ? 6 : 3;
      const delay = total > 1800 ? 10 : total > 900 ? 14 : 18;
      for (let index = step; index < total + step; index += step) {
        body.innerHTML = renderMarkdown(answer.slice(0, index));
        scrollToBottom();
        await new Promise((resolve) => window.setTimeout(resolve, delay));
      }

      copyButton.disabled = false;
      copyButton.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(answer);
          copyButton.textContent = t("copied");
          setTimeout(() => {
            copyButton.textContent = t("copy");
          }, 1200);
        } catch {
          copyButton.textContent = t("copyFailed");
          setTimeout(() => {
            copyButton.textContent = t("copy");
          }, 1200);
        }
      });

      card.querySelectorAll(".source-chip").forEach((chip) => {
        chip.addEventListener("click", () => {
          const item = chip.closest(".source-item");
          item.classList.toggle("open");
          chip.lastElementChild.textContent = item.classList.contains("open") ? "−" : "+";
        });
      });
    }

    function createErrorMessage(message) {
      createMessage(
        "assistant",
        '<div class="answer-card"><div class="answer-body error"><p>' + escapeHtml(message) + "</p></div></div>"
      );
    }

    async function ask(question) {
      const trimmed = question.trim();
      if (!trimmed) return;

      createUserMessage(trimmed);
      input.value = "";
      autoResize();
      input.focus();
      sendButton.disabled = true;
      createLoadingMessage();

      try {
        const response = await fetch(API_ENDPOINT, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            question: trimmed,
            top_k: 3,
            language
          })
        });

        if (!response.ok) {
          throw new Error("Request failed with status " + response.status);
        }

        const data = await response.json();
        removeLoadingMessage();

        const answer = data.answer || (Array.isArray(data.results) && data.results.length
          ? data.results.map((item) => "- " + (item.content || "")).join("\n")
          : t("noAnswer"));
        const sources = data.sources || data.results || [];
        await streamAssistantMessage(answer, sources);
      } catch (error) {
        removeLoadingMessage();
        createErrorMessage(t("error"));
        console.error(error);
      } finally {
        sendButton.disabled = false;
        input.focus();
        scrollToBottom();
      }
    }

    function renderExamples() {
      examples.innerHTML = "";
      for (const question of t("examples")) {
        const button = document.createElement("button");
        button.className = "example-btn";
        button.type = "button";
        button.textContent = question;
        button.addEventListener("click", () => ask(question));
        examples.appendChild(button);
      }
    }

    function applyLanguage(nextLanguage) {
      language = nextLanguage;
      document.documentElement.lang = language === "zh" ? "zh-CN" : "en";
      document.title = t("pageTitle");
      input.placeholder = t("inputPlaceholder");
      sendButton.textContent = t("send");
      document.querySelectorAll("[data-i18n]").forEach((node) => {
        node.textContent = t(node.dataset.i18n);
      });
      document.querySelectorAll(".lang-btn").forEach((button) => {
        button.classList.toggle("active", button.dataset.lang === language);
      });
      renderExamples();
    }

    composer.addEventListener("submit", (event) => {
      event.preventDefault();
      ask(input.value);
    });

    input.addEventListener("input", autoResize);
    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        composer.requestSubmit();
      }
    });

    document.querySelectorAll(".lang-btn").forEach((button) => {
      button.addEventListener("click", () => applyLanguage(button.dataset.lang));
    });

    applyLanguage("zh");
    autoResize();
    input.focus();
  </script>
</body>
</html>
